<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Maha Shivratri</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background: radial-gradient(circle at center, #0d0d0d, #000);
        overflow: hidden;
        font-family: 'Segoe UI', sans-serif;
        color: white;
        text-align: center;
    }

    h1 {
        font-size: 3em;
        margin-top: 20vh;
        animation: glow 2s infinite alternate;
    }

    @keyframes glow {
        from { text-shadow: 0 0 10px #ffcc00, 0 0 20px #ff9900, 0 0 30px #ff6600; }
        to { text-shadow: 0 0 20px #ffff66, 0 0 30px #ffcc00, 0 0 40px #ff9900; }
    }

    .om {
        font-size: 5em;
        margin-top: 20px;
        animation: omGlow 3s infinite alternate;
    }

    @keyframes omGlow {
        from { text-shadow: 0 0 15px #00ffff, 0 0 30px #00ccff; }
        to { text-shadow: 0 0 25px #66ffff, 0 0 40px #00ffff; }
    }

    canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: -1;
    }
</style>
</head>
<body>

<h1>🌸 Happy Maha Shivratri 🌸</h1>
<div class="om">🕉️</div>

<canvas id="particles"></canvas>

<script>
    // Particle animation background
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particlesArray;

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        init();
    });

    class Particle {
        constructor(x, y, size, speedX, speedY) {
            this.x = x;
            this.y = y;
            this.size = size;
            this.speedX = speedX;
            this.speedY = speedY;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.size > 0.2) this.size -= 0.02;
        }
        draw() {
            ctx.fillStyle = 'rgba(255, 215, 0, 0.8)';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function init() {
        particlesArray = [];
        for (let i = 0; i < 100; i++) {
            const size = Math.random() * 5 + 1;
            const x = Math.random() * canvas.width;
            const y = Math.random() * canvas.height;
            const speedX = (Math.random() - 0.5) * 1;
            const speedY = (Math.random() - 0.5) * 1;
            particlesArray.push(new Particle(x, y, size, speedX, speedY));
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particlesArray.length; i++) {
            particlesArray[i].update();
            particlesArray[i].draw();
        }
        requestAnimationFrame(animate);
    }

    init();
    animate();
</script>

</body>
</html>
